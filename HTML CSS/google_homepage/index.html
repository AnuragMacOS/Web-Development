<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-------------top-section ---------------->
    
    <div class="top-section">
        <div class="left-section">
            <a href="https://about.google/">About</a>
            <a href="https://store.google.com">Store</a>
        </div>
        <div class="right-section">
            <a href="https://gmail.com">Gmail</a>
            <a href="https://images.google.com">Images</a>

            <img class="app-icon" src="./Images/Dots.png" />
            <img class="profile-pic" src="./Images/profile.jpg" />

        </div>
    </div>

    <!-------------middle-section ---------------->

    <div class="middle-section">
        <form class="search-form">
            <img class="google-logo" src="./Images/google_logo.png">
            
            <div class="search-form-input">
                <img class="search-icon" src="./Images/search.png">

                <label for="search">Search</label>
                <input type="text" name="search" id="search">

                <img class="mic" src="./Images/mic.png">
                <img class="camera" src="./Images/camera.png">
            </div>


            <div class="search-form-buttons">
                <button type="submit">Search</button>
                <button type="submit">I'm Feeling Lucky</button>
            </div>
        </form>

    </div>
    
    <!-------------bottom-section ---------------->

    <div class="bottom-section">
        <div class="bottom-left">
            <a href="https://ads.google.com/">Advertising</a>
            <a href="https://smallbusiness.withgoogle.com/#!/">Business</a>
            <a href="https://www.google.com/search/howsearchworks/?fg=1">How Search</a>
        </div>

        <div class="bottom-middle">
            <a href="https://sustainability.google/carbon-free/#home">Carbon Neutral</a>
        </div>

        <div class="bottom-right">
            <a href="https://policies.google.com/privacy?hl=en&fg=1">Privacy</a>
            <a href="https://policies.google.com/terms?hl=en&fg=1">Terms</a>
            <a href="https://www.google.com/settings">Settings</a>
        </div>
    </div>
</body>

</html>
